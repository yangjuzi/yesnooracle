		/* 按下后的按钮样式 */
#yesNoButton:active {
    background-color: #1f0edb; /* 更深的绿色，按下时改变 */
    box-shadow: 0 5px #666; /* 添加阴影效果 */
    transform: translateY(4px); /* 让按钮有“按下去”的感觉 */
}
        .yes {

        .no {

        .yes.no {

          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }
    </style>

    <h1 style="background-color: #020d24;" class="text-4xl font-bold text-[#7e70f4]">Yes or No Decision，random Yes No Button will answer your questions with Yes or No</h1>

  <div id="body-main" class="mainbutton">
  <div id="result" class="yes no">YES or NO</div>
<button id="yesNoButton">Click Me!</button>

<script>
    function showResult(result) {
        document.getElementById('result').className = '';
        document.getElementById('result').textContent = result;
        document.getElementById('result').classList.add(result === 'Yes' ? 'yes' : 'no');
    }

    document.getElementById('yesNoButton').addEventListener('click', function() {
        var randomResult = Math.random() > 0.5 ? 'Yes' : 'No';
        showResult(randomResult);
    });
</script>
